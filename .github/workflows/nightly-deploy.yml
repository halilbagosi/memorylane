name: Nightly Alpha Build

# University project strategy:
# - main → DigitalOcean App Platform (production deployment)
# - alpha → GitHub Actions build/test only (no deployment, no extra costs)
#
# This nightly build verifies that the alpha branch:
# - Installs dependencies successfully
# - Builds without errors
# - Passes tests (optional)
# - Does NOT deploy (keeping costs low)

on:
  schedule:
    # Runs nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Test Alpha Branch

    steps:
      - name: Checkout alpha branch
        uses: actions/checkout@v4
        with:
          ref: alpha

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: |
          cd backend/server
          npm install

      - name: Build backend
        run: |
          cd backend/server
          npm run build

      - name: Run backend tests
        run: |
          cd backend/server
          npm run test:e2e 2>/dev/null || echo "Tests skipped or failed (non-blocking)"
        continue-on-error: true

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build 2>/dev/null || echo "Frontend build not critical for this check"
        continue-on-error: true

      - name: Report success
        if: success()
        run: echo "Alpha branch build successful - ready for review/merge to main"

      - name: Report issues
        if: failure()
        run: echo "Alpha branch build failed - check logs for errors"
